<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}makerhub{% endblock %}</title>
  <link rel="icon" href="data:,">
  <link rel="shortcut icon" href="data:,">
  <script>
    (() => {
      const root = document.documentElement;
      const preference = {{ theme_preference|default("auto")|tojson }};
      const media = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)") : null;
      const resolved = preference === "light" || preference === "dark"
        ? preference
        : (media && media.matches ? "dark" : "light");
      root.dataset.themePreference = preference;
      root.dataset.theme = resolved;
    })();
  </script>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="{% if not show_sidebar|default(true) %}shell--no-sidebar {% endif %}{% block body_class %}{% endblock %}">
  <div class="site-shell{% if not show_sidebar|default(true) %} site-shell--no-sidebar{% endif %}">
    {% if show_sidebar|default(true) %}
    <aside class="site-sidebar">
      <div class="site-sidebar__inner">
        <a class="brand-mark" href="/">
          <span class="brand-mark__badge">MH</span>
          <span>
            <strong>makerhub</strong>
            <small>真实归档数据工作台</small>
          </span>
        </a>

        <nav class="sidebar-nav">
          <a class="sidebar-nav__link{% if active_page == 'home' %} is-active{% endif %}" href="/">首页</a>
          <a class="sidebar-nav__link{% if active_page == 'models' %} is-active{% endif %}" href="/models">模型库</a>
          <a class="sidebar-nav__link{% if active_page == 'subscriptions' %} is-active{% endif %}" href="/subscriptions">订阅</a>
          <a class="sidebar-nav__link{% if active_page == 'settings' %} is-active{% endif %}" href="/settings">设置</a>
          <a class="sidebar-nav__link{% if active_page == 'tasks' %} is-active{% endif %}" href="/tasks">归档任务</a>
          <a class="sidebar-nav__link{% if active_page == 'logs' %} is-active{% endif %}" href="/logs">日志</a>
        </nav>

        <div class="sidebar-footer" data-user-menu-root>
          <button
            class="user-launcher"
            type="button"
            aria-haspopup="dialog"
            aria-expanded="false"
            data-user-menu-toggle
          >
            <span class="user-launcher__avatar">{{ user_avatar_text }}</span>
            <span class="user-launcher__meta">
              <strong>{{ user_display_name }}</strong>
              <small>{{ user_username }}</small>
            </span>
          </button>

          <div class="user-menu" hidden data-user-menu>
            <div class="user-menu__header">
              <span class="user-menu__avatar">{{ user_avatar_text }}</span>
              <div>
                <span class="user-menu__role">管理员</span>
                <strong>{{ user_display_name }}</strong>
                <small>{{ user_username }}</small>
              </div>
            </div>

            <div class="user-menu__group">
              <a class="user-menu__link" href="/settings?tab=user">个人信息</a>
              <a class="user-menu__link" href="/settings?tab=connections">系统设置</a>
            </div>

            <form class="user-menu__theme" data-save-kind="theme" data-theme-form>
              <div class="user-menu__section-title">主题</div>
              <input type="hidden" name="theme_preference" value="{{ theme_preference }}">
              <div class="theme-toggle theme-toggle--compact" data-theme-toggle>
                <button class="theme-toggle__option" type="button" data-theme-choice="light">浅色</button>
                <button class="theme-toggle__option" type="button" data-theme-choice="dark">深色</button>
                <button class="theme-toggle__option" type="button" data-theme-choice="auto">自动</button>
              </div>
              <span class="form-status" data-form-status></span>
            </form>

            <div class="user-menu__group user-menu__group--footer">
              <a class="button button-secondary button-small user-menu__logout" href="/logout">退出登录</a>
            </div>
          </div>

          <span class="sidebar-version">v{{ app_version }}</span>
        </div>
      </div>
    </aside>
    {% endif %}

    <main class="page-shell{% if not show_sidebar|default(true) %} page-shell--full{% endif %}">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
