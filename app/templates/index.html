<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MW Portal</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">MW Portal</div>
      <nav class="nav">
        <button class="nav-item is-active" data-tab="cookie-cn">国内 Cookie</button>
        <button class="nav-item" data-tab="cookie-global">国际 Cookie</button>
        <button class="nav-item" data-tab="proxy">HTTP 代理</button>
        <button class="nav-item" data-tab="archive">模型归档</button>
        <button class="nav-item" data-tab="user">用户信息</button>
        <button class="nav-item" data-tab="missing">缺失 3MF</button>
        <button class="nav-item" data-tab="notify">通知</button>
        <button class="nav-item" data-tab="organize">本地整理</button>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1>全新重建版后台</h1>
          <p>爬虫能力沿用旧项目，页面和任务系统重写。</p>
        </div>
        <a class="preview-link" href="/detail-preview">查看详情页预览</a>
      </header>

      <section class="panel is-active" data-panel="cookie-cn">
        <h2>国内 Cookie</h2>
        <textarea rows="8" placeholder="makerworld.com.cn Cookie"></textarea>
      </section>

      <section class="panel" data-panel="cookie-global">
        <h2>国际 Cookie</h2>
        <textarea rows="8" placeholder="makerworld.com Cookie"></textarea>
      </section>

      <section class="panel" data-panel="proxy">
        <h2>HTTP 代理</h2>
        <div class="form-grid">
          <input placeholder="http://127.0.0.1:7890">
          <input placeholder="https://127.0.0.1:7890">
          <input placeholder="localhost,127.0.0.1">
        </div>
      </section>

      <section class="panel" data-panel="archive">
        <h2>模型归档</h2>
        <input class="wide" placeholder="输入单模型、作者上传页或收藏夹模型页链接">
        <div class="hint">这里后面会接旧项目的爬虫核心和任务队列。</div>
      </section>

      <section class="panel" data-panel="user">
        <h2>用户信息</h2>
        <div class="form-grid">
          <input placeholder="admin">
          <input placeholder="显示名称">
          <input placeholder="密码提示">
        </div>
      </section>

      <section class="panel" data-panel="missing">
        <h2>缺失 3MF 重新下载</h2>
        <div class="table-like">
          <div class="row head"><span>模型 ID</span><span>标题</span><span>状态</span></div>
          <div class="row"><span>2247129</span><span>海上餐厅巴拉蒂</span><span>missing</span></div>
        </div>
      </section>

      <section class="panel" data-panel="notify">
        <h2>通知</h2>
        <div class="form-grid">
          <input placeholder="Telegram Bot Token">
          <input placeholder="Chat ID">
          <input placeholder="Webhook URL">
        </div>
      </section>

      <section class="panel" data-panel="organize">
        <h2>本地 3MF 文件整理</h2>
        <div class="form-grid">
          <input placeholder="源目录">
          <input placeholder="目标目录">
          <label class="checkbox"><input type="checkbox" checked> 移动文件而不是复制</label>
        </div>
      </section>
    </main>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
