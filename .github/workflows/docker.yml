name: Docker

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt pytest PyYAML

      - name: Run backend tests
        run: python -m pytest -q

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Validate Compose files
        env:
          MAKERHUB_POSTGRES_PASSWORD: ci-postgres-password
          MAKERHUB_CLOAKBROWSER_AUTH_TOKEN: ci-cloakbrowser-token
          MAKERHUB_FLARESOLVERR_URL: http://flaresolverr.example.test:8191/v1
        run: |
          docker compose -f compose.yaml config --quiet
          docker compose -f compose.external-flaresolverr.yaml config --quiet

      - name: Check release version
        run: python scripts/check_release_version.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: makerhub:verify

      - name: Smoke test image
        run: >-
          docker run --rm makerhub:verify
          python -c "from importlib.metadata import version; from pathlib import Path; import app.main; image_version = Path('/app/VERSION').read_text(encoding='utf-8').strip(); assert image_version; assert app.main.app.version == image_version; version('fastapi')"

  release:
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check release tag
        run: python scripts/check_release_version.py --tag "${GITHUB_REF_NAME}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Refuse existing version tag
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          IMAGE_PATH="${GITHUB_REPOSITORY_OWNER,,}/makerhub"
          TOKEN_RESPONSE_FILE="$(mktemp)"
          trap 'rm -f "${TOKEN_RESPONSE_FILE}"' EXIT

          set +e
          TOKEN_HTTP_STATUS="$(
            curl --silent --show-error \
              --output "${TOKEN_RESPONSE_FILE}" \
              --write-out '%{http_code}' \
              --user "${GITHUB_ACTOR}:${GHCR_TOKEN}" \
              "https://ghcr.io/token?service=ghcr.io&scope=repository:${IMAGE_PATH}:pull"
          )"
          TOKEN_CURL_STATUS=$?
          set -e
          if [ "${TOKEN_CURL_STATUS}" -ne 0 ] || [ "${TOKEN_HTTP_STATUS}" != "200" ]; then
            echo "::error::Unable to authenticate the GHCR manifest check."
            exit 1
          fi

          REGISTRY_TOKEN="$(
            python -c 'import json, sys; payload = json.load(sys.stdin); print(payload.get("token") or payload.get("access_token") or "")' \
              < "${TOKEN_RESPONSE_FILE}"
          )"
          if [ -z "${REGISTRY_TOKEN}" ]; then
            echo "::error::GHCR did not return a registry token."
            exit 1
          fi

          set +e
          MANIFEST_STATUS="$(
            curl --silent --show-error \
              --output /dev/null \
              --write-out '%{http_code}' \
              --request HEAD \
              --header "Authorization: Bearer ${REGISTRY_TOKEN}" \
              --header 'Accept: application/vnd.oci.image.index.v1+json, application/vnd.oci.image.manifest.v1+json, application/vnd.docker.distribution.manifest.list.v2+json, application/vnd.docker.distribution.manifest.v2+json' \
              "https://ghcr.io/v2/${IMAGE_PATH}/manifests/${GITHUB_REF_NAME}"
          )"
          MANIFEST_CURL_STATUS=$?
          set -e
          if [ "${MANIFEST_CURL_STATUS}" -ne 0 ]; then
            echo "::error::Unable to query the GHCR version manifest."
            exit 1
          fi

          case "${MANIFEST_STATUS}" in
            404)
              echo "Version tag ${GITHUB_REF_NAME} is available."
              ;;
            200)
              echo "::error::Version tag ${GITHUB_REF_NAME} already exists and is immutable."
              exit 1
              ;;
            *)
              echo "::error::Unable to determine whether ${GITHUB_REF_NAME} exists (HTTP ${MANIFEST_STATUS})."
              exit 1
              ;;
          esac

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/makerhub
          flavor: latest=false
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=sha
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
