name: Docker

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt pytest PyYAML

      - name: Run backend tests
        run: python -m pytest -q

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Validate Compose files
        env:
          MAKERHUB_POSTGRES_PASSWORD: ci-postgres-password
          MAKERHUB_CLOAKBROWSER_AUTH_TOKEN: ci-cloakbrowser-token
          MAKERHUB_FLARESOLVERR_URL: http://flaresolverr.example.test:8191/v1
        run: |
          docker compose -f compose.yaml config --quiet
          docker compose -f compose.yaml -f compose.external-flaresolverr.yaml config --quiet

      - name: Check release version
        run: python scripts/check_release_version.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: makerhub:verify

      - name: Smoke test image
        run: >-
          docker run --rm makerhub:verify
          python -c "from importlib.metadata import version; from pathlib import Path; import app.main; image_version = Path('/app/VERSION').read_text(encoding='utf-8').strip(); assert image_version; assert app.main.app.version == image_version; version('fastapi')"

  release:
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    concurrency:
      group: makerhub-release-promotion
      cancel-in-progress: false
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check release tag
        run: |
          set -euo pipefail
          python scripts/check_release_version.py --tag "${GITHUB_REF_NAME}"
          git fetch origin main --depth=1
          git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check version tag availability
        run: |
          set -euo pipefail
          IMAGE_REF="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/makerhub:${GITHUB_REF_NAME}"
          INSPECT_OUTPUT="$(mktemp)"
          trap 'rm -f "${INSPECT_OUTPUT}"' EXIT
          set +e
          docker buildx imagetools inspect "${IMAGE_REF}" >"${INSPECT_OUTPUT}" 2>&1
          INSPECT_STATUS=$?
          set -e
          if [ "${INSPECT_STATUS}" -eq 0 ]; then
            echo "::error::Version tag ${GITHUB_REF_NAME} already exists and is immutable."
            exit 1
          fi
          cat "${INSPECT_OUTPUT}" >&2
          echo "::warning::GHCR manifest precheck was unavailable; continuing to the image push."

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/makerhub
          flavor: latest=false
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Promote verified release as latest
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/makerhub"
          docker buildx imagetools create \
            --tag "${IMAGE}:latest" \
            "${IMAGE}:${GITHUB_REF_NAME}"
