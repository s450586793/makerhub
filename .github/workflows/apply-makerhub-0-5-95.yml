name: Apply MakerHub 0.5.95 Patch

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-makerhub-0-5-95.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Apply patch
        shell: bash
        run: |
          cat > /tmp/makerhub.patch.b64 <<'PATCH'

PATCH
          base64 -d /tmp/makerhub.patch.b64 > /tmp/makerhub.patch
          git apply --index /tmp/makerhub.patch
      - name: Commit patch and remove workflow
        shell: bash
        run: |
          git config user.name "s450586793"
          git config user.email "53229926+s450586793@users.noreply.github.com"
          git rm .github/workflows/apply-makerhub-0-5-95.yml
          git commit -m "release makerhub 0.5.95"
          git push
