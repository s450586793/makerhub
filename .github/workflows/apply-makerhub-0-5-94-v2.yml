name: Apply MakerHub 0.5.94 Patch V2

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-makerhub-0-5-94-v2.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply patch and remove temporary workflows
        run: |
          cat > /tmp/makerhub-0.5.94.patch.b64 <<'PATCH_B64'
          
          PATCH_B64
          sed -i 's/^          //' /tmp/makerhub-0.5.94.patch.b64
          base64 -d /tmp/makerhub-0.5.94.patch.b64 > /tmp/makerhub-0.5.94.patch
          git apply --index --whitespace=nowarn /tmp/makerhub-0.5.94.patch
          rm -f .github/workflows/apply-makerhub-0-5-94.yml .github/workflows/apply-makerhub-0-5-94-v2.yml
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "clear stale missing 3mf source health on retry"
          git push
